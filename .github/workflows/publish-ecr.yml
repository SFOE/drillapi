name: Publish Docker Image to AWS ECR, Deploy on Release

on:
  pull_request:
    types: [opened, synchronize]
  release:
    types: [published]
  push:
    branches:
      - main  

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  # ----------------------------------------------------------
  # Build and push Docker image to ECR for PRs, main branch, and releases
  # ----------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      release-log: ${{ steps.build-and-push-release.outcome }}
    environment: prometheon-access

    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
            role: SFOE_DRILLAPI_PIPELINE_ROLE_DEV
          - name: prod
            role: SFOE_DRILLAPI_PIPELINE_ROLE_PROD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Login to AWS ECR
      # ----------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.env.role] }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ----------------------------------------------------------
      # Build and push (PR)
      # ----------------------------------------------------------
      - name: Build and push Docker image (PR)
        id: build-and-push-pr
        if: github.event_name == 'pull_request' && matrix.env.name == 'dev'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # ----------------------------------------------------------
      # Build and push (merge into main)
      # ----------------------------------------------------------
      - name: Build and push Docker image (Main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.env.name == 'dev'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          IMAGE_TAG: latest
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # ----------------------------------------------------------
      # Build and push (release)
      # ----------------------------------------------------------
      - name: Build and push Docker image (Release)
        id: build-and-push-release
        if: github.event_name == 'release'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          VERSION_TAG: ${{ github.event.release.tag_name }}
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG



  # ----------------------------------------------------------
  # scan repo for vulnerabilites with aws inspector
  # ---------------------------------------------------------- 
  inspector-scan:
    name: inspector-scan
    runs-on: ubuntu-latest
    environment: prometheon-access

    steps:
      # Check out your repository if needed
      - name: Checkout this repository
      # ----------------------------------------------------------
      # Login to AWS
      # ----------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.SFOE_DRILLAPI_PIPELINE_ROLE_DEV }}
          aws-region: eu-central-1

      # Check out your repository if needed
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Inspector Scan
        id: inspector
        uses: aws-actions/vulnerability-scan-github-action-for-amazon-inspector@v1
        with:
          # change artifact_type to either 'repository', 'container', 'binary', or 'archive'.
          artifact_type: 'repository'

          # change artifact_path to the file path or container image you would like to scan.
          # File paths should be relative to your root project directory.
          # For containers, this action accepts 'docker pull'-style references to containers,
          # such as 'alpine:latest' or a file path to an image exported as TAR using docker save.
          artifact_path: './'

          # If enabled, this setting will display Inspector's vulnerability scan findings
          # as a GitHub actions step summary. See here for an example step summary:
          # https://github.com/aws-actions/vulnerability-scan-github-action-for-amazon-inspector/actions/runs/8800085041
          display_vulnerability_findings: "enabled"

          # Set vulnerability thresholds; if the number of vulnerabilities is
          # equal to or greater than any of the specified thresholds, this
          # action will set the 'vulnerability_threshold_exceeded'
          # output flag to 1.
          critical_threshold: 1
          high_threshold: 1
          medium_threshold: 1
          low_threshold: 1
          other_threshold: 1

         # Additional input arguments are available to control scan behavior.
         # See 'action.yml' for additional input/output options.


      # The following steps illustrate how to
      # display scan results in the GitHub Actions job terminal.
      - name: Display CycloneDX SBOM (JSON)
        run: cat ${{ steps.inspector.outputs.artifact_sbom }}

      - name: Display Inspector vulnerability scan results (JSON)
        run: cat ${{ steps.inspector.outputs.inspector_scan_results }}

      - name: Display Inspector vulnerability scan results (CSV)
        run: cat ${{ steps.inspector.outputs.inspector_scan_results_csv }}

      - name: Display Inspector vulnerability scan results (Markdown)
        run: cat ${{ steps.inspector.outputs.inspector_scan_results_markdown }}
        

  # ----------------------------------------------------------
  # Automated deployment upon release
  # ----------------------------------------------------------
  deploy-image:            
    name: deploy-image
    needs: build-and-push
    runs-on: ubuntu-latest
    if: (needs.build-and-push.outputs.release-log == 'success') && (github.event_name == 'release')
    environment: prometheon-access
    env:
          VERSION_TAG: ${{ github.event.release.tag_name }}
    
    # ----------------------------------------------------------
    # Matrix strategy to differentiate environments
    # ----------------------------------------------------------
    strategy:
      matrix:
        env:
          - name: dev
          - name: prod          

    steps:
      # ----------------------------------------------------------
      # Authenticate as GitHub App
      # ----------------------------------------------------------
      - name: Authenticate as GitHub App
        id: app-auth
        uses: actions/create-github-app-token@v2
        with:
            app-id: ${{ secrets.GH_APP_ID }}
            private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
            owner: SFOE-Prometheon

      # ----------------------------------------------------------
      # Checkout Terraform Repo using GitHub App Token
      # ----------------------------------------------------------
      - name: Clone Terraform Repo
        uses: actions/checkout@v4
        with:
            repository: SFOE-prometheon/prometheon-drillcheck-${{ matrix.env.name }}
            ref: main
            token: ${{ steps.app-auth.outputs.token }}
            path: tf-repo

      # ----------------------------------------------------------
      # Update Version
      # ----------------------------------------------------------
      - name: Update version in Terraform repo        
        run: |
            cd tf-repo
            sed -i "s/\"backend_app_version\": \".*\"/\"backend_app_version\": \"${{ env.VERSION_TAG }}\"/" deploy.auto.tfvars.json

      # ----------------------------------------------------------
      # Commit & Push/PR based on environment
      # ----------------------------------------------------------
      - name: Create branch and commit changes
        run: |
            cd tf-repo
            git config user.name "GitHub Actions"
            git config user.email "noreply@github.com"
            git checkout -b deploy/backend-${{ env.VERSION_TAG }}
            git add deploy.auto.tfvars.json
            git commit -m "Deploy backend version ${{ env.VERSION_TAG }}"
            
      - name: Push to main (Dev environment)
        if: matrix.env.name == 'dev'
        run: |
            cd tf-repo
            git push origin deploy/backend-${{ env.VERSION_TAG }}:main
        env:
            GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Create PR (Prod environment)
        if: matrix.env.name == 'prod'
        run: |
            cd tf-repo
            git push origin deploy/backend-${{ env.VERSION_TAG }}
            gh pr create \
              --base main \
              --head deploy/backend-${{ env.VERSION_TAG }} \
              --title "Deploy backend version ${{ env.VERSION_TAG }} to prod" \
              --body "Automated deployment PR for backend version ${{ env.VERSION_TAG }}"
        env:
            GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      

