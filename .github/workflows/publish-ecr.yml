name: Publish Docker Image to AWS ECR, Deploy on Release

on:
  pull_request:
    types: [opened, synchronize]
  release:
    types: [published]
  push:
    branches:
      - main
  workflow_call:
    inputs:
      runner:
        description: 'The runner to execute the workflow on'
        default: 'ubuntu-latest'
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build-and-push-job:
    runs-on: ${{ inputs.runner }}
    outputs:
      build-and-push-log: ${{ steps.build-and-push.outcome }}
    environment: prometheon-access

    strategy:
      matrix:
        env:
          - name: dev
            role: SFOE_DRILLAPI_PIPELINE_ROLE_DEV
          - name: prod
            role: SFOE_DRILLAPI_PIPELINE_ROLE_PROD

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars[matrix.env.role] }}
          aws-region: eu-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image (PR)
        id: build-and-push
        if: github.event_name == 'pull_request' && matrix.env.name == 'dev'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          IMAGE_TAG: pr-${{ github.event.pull_request.number }}
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and push Docker image (Main branch)
        id: build-and-push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.env.name == 'dev'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          IMAGE_TAG: latest
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Build and push Docker image (Release)
        id: build-and-push
        if: github.event_name == 'release'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: drillapi
          VERSION_TAG: ${{ github.event.release.tag_name }}
        run: |
          docker build -f Dockerfile.lambda -t $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$VERSION_TAG


  deploy-image:
    name: upon release deploy image to dev environment, open PR to prod environment
    needs: build-and-push-run
    runs-on: ${{ inputs.runner }}
    if: (needs.build-and-push-run.outputs.build-and-push-log == 'success') # && (github.event_name == 'release')
    environment: prometheon-access
    env:
          VERSION_TAG: ${{ github.event.release.tag_name }}

    steps:
      # ----------------------------------------------------------
      # Authenticate as GitHub App
      # ----------------------------------------------------------
      - name: Authenticate as GitHub App
        id: app-auth
        uses: tibdex/github-app-token@v1
        with:
            app_id: ${{ secrets.GH_APP_ID }}
            private_key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      # ----------------------------------------------------------
      # Checkout Terraform Repo using GitHub App Token
      # ----------------------------------------------------------
      - name: Clone Terraform Repo
        uses: actions/checkout@v4
        with:
            repository: SFOE-prometheon/prometheon-drillcheck-${{ matrix.env.name }}
            token: ${{ steps.app-auth.outputs.token }}
            path: tf-repo

      # ----------------------------------------------------------
      # Update Version
      # ----------------------------------------------------------
      - name: Update version in Terraform repo        
        run: |
            cd tf-repo
            sed -i "s/backend_app_version = \".*\"/backend_app_version = \"${{ env.VERSION_TAG }}\"/" deploy.auto.tfvars

      # ----------------------------------------------------------
      # Commit & Push/PR based on environment
      # ----------------------------------------------------------
      - name: Create branch and commit changes
        run: |
            cd tf-repo
            git config user.name "GitHub Actions"
            git config user.email "noreply@github.com"
            git checkout -b deploy/backend-${{ env.VERSION_TAG }}
            git add deploy.auto.tfvars
            git commit -m "Deploy backend version ${{ env.VERSION_TAG }}"
      
      
      # - name: Push to main (Dev environment)
      #         if: matrix.env.name == 'dev'
      #         run: |
      #             cd tf-repo
      #             git push origin deploy/backend-${{ env.VERSION_TAG }}:main
      #             git push origin --delete deploy/backend-${{ env.VERSION_TAG }}
      #         env:
      #             GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}

      - name: Create PR (DEV TEST environment)
        if: matrix.env.name == 'dev'
        run: |
            cd tf-repo
            git push origin deploy/backend-${{ env.VERSION_TAG }}
            gh pr create \
              --base main \
              --head deploy/backend-${{ env.VERSION_TAG }} \
              --title "Deploy backend version ${{ env.VERSION_TAG }} to dev" \
              --body "Automated deployment PR for backend version ${{ env.VERSION_TAG }}"
        env:
            GITHUB_TOKEN: ${{ steps.app-auth.outputs.token }}


